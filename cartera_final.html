<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Control de Inversiones</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial,sans-serif;background:#f0f2f5;color:#111;font-size:14px;}h1{background:#1e3a5f;color:#fbbf24;padding:14px 20px;font-size:17px;}#bar{background:#fff;padding:10px 20px;border-bottom:2px solid #e5e7eb;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}#bar label{font-size:13px;color:#555;}#bar input[type=date]{padding:5px 8px;border:1px solid #ccc;border-radius:5px;font-size:13px;}.btn{padding:7px 13px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:bold;color:#fff;}.b1{background:#2563eb;}.b2{background:#16a34a;}.b3{background:#6b7280;}.b4{background:#dc2626;padding:3px 7px;font-size:11px;}#stbar{background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:5px 20px;font-size:12px;color:#6b7280;font-family:monospace;}#tabs{background:#fff;padding:0 20px;border-bottom:2px solid #e5e7eb;display:flex;}.tab{padding:10px 16px;cursor:pointer;border-bottom:3px solid transparent;font-size:13px;font-weight:bold;color:#6b7280;background:none;border-top:none;border-left:none;border-right:none;}.tab.on{border-bottom-color:#2563eb;color:#2563eb;}#main{padding:16px 20px;}.pg{display:none;}.pg.on{display:block;}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:16px;}.card{background:#fff;border-radius:8px;padding:12px 14px;border-left:4px solid #2563eb;box-shadow:0 1px 3px rgba(0,0,0,.08);}.card .lb{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}.card .vl{font-size:16px;font-weight:bold;font-family:monospace;}.card .sb{font-size:11px;color:#6b7280;margin-top:2px;font-family:monospace;}.pos{color:#16a34a!important;}.neg{color:#dc2626!important;}.sec{background:#fff;border-radius:8px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}.sh{background:#1e3a5f;color:#fbbf24;padding:9px 14px;font-weight:bold;font-size:14px;}.tw{overflow-x:auto;}table{width:100%;border-collapse:collapse;min-width:560px;}th{background:#f8fafc;color:#6b7280;font-size:11px;text-transform:uppercase;padding:8px 10px;text-align:right;border-bottom:1px solid #e5e7eb;font-weight:600;white-space:nowrap;}th:first-child{text-align:left;}td{padding:8px 10px;text-align:right;border-bottom:1px solid #f1f5f9;font-size:13px;font-family:monospace;white-space:nowrap;}td:first-child{text-align:left;font-family:Arial,sans-serif;}tr:hover td{background:#f8fafc;}.sr td{background:#fafafa;}.sr td:first-child{padding-left:22px;}.tr td{background:#eff6ff;font-weight:bold;border-top:2px solid #bfdbfe;}.bg{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:bold;font-family:monospace;}.bp{background:#dcfce7;color:#15803d;}.bn{background:#fee2e2;color:#b91c1c;}.bz{background:#f1f5f9;color:#64748b;}.bd{background:#dbeafe;color:#1d4ed8;}input.mi{width:120px;text-align:right;padding:4px 8px;border:2px solid #2563eb;border-radius:4px;font-family:monospace;font-size:13px;background:#fff;color:#111;}input.mi:focus{outline:none;border-color:#1d4ed8;background:#eff6ff;}.fb{background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}.fb h3{font-size:14px;margin-bottom:10px;}.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:8px;align-items:end;}.ff{display:flex;flex-direction:column;gap:3px;}.ff label{font-size:11px;color:#6b7280;}.ff input,.ff select{padding:5px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;font-family:monospace;background:#fff;}.ff input:focus,.ff select:focus{outline:2px solid #2563eb;}.htabs{display:flex;gap:4px;margin-bottom:10px;}.htb{padding:5px 11px;border-radius:5px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:12px;font-weight:bold;color:#6b7280;}.htb.on{background:#2563eb;color:#fff;border-color:#2563eb;}textarea.jb{width:100%;height:200px;font-family:monospace;font-size:11px;padding:8px;border:1px solid #d1d5db;border-radius:6px;resize:vertical;background:#f8fafc;}.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}.ov.op{display:flex;}.mb{background:#fff;border-radius:10px;padding:20px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;}.mb h3{font-size:15px;margin-bottom:10px;}.mb .row{display:flex;gap:8px;margin-top:10px;}.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:bold;color:#fff;display:none;z-index:200;}</style></head><body><h1>📊 Control Semanal de Inversiones</h1><div id="bar"><label>Semana:</label><input type="date" id="wdate"><button class="btn b1" onclick="saveWeek()">💾 Guardar semana</button><button class="btn b2" onclick="openExp()">⬇ Exportar JSON</button><button class="btn b3" onclick="openImp()">⬆ Importar JSON</button></div><div id="stbar">Sin datos guardados aún</div><div id="tabs"><button class="tab on" onclick="goTab('ov',this)">📈 Resumen</button><button class="tab" onclick="goTab('dv',this)">💶 Dividendos</button><button class="tab" onclick="goTab('aq',this)">🧾 Adquisiciones</button><button class="tab" onclick="goTab('hi',this)">📅 Histórico</button></div><div id="main"><div class="pg on" id="pg-ov"><div class="cards" id="cards"></div><div id="sects"></div></div><div class="pg" id="pg-dv"><div class="fb"><h3>💶 Registrar dividendo o cupón</h3><div class="fg"><div class="ff"><label>Activo</label><select id="dv-a"><option value="acciones">📈 Acciones</option><option value="cln">📋 CLN SAN RKUNY</option><option value="phoenix">📋 Phoenix Ørsted</option></select></div><div class="ff"><label>Fecha</label><input type="date" id="dv-d"></div><div class="ff"><label>Bruto €</label><input type="number" id="dv-g" step="0.01" placeholder="Opcional"></div><div class="ff"><label>Retención €</label><input type="number" id="dv-t" step="0.01" placeholder="Opcional"></div><div class="ff"><label>Neto € *</label><input type="number" id="dv-n" step="0.01" placeholder="Requerido"></div><div class="ff"><label>Concepto</label><input type="text" id="dv-c" placeholder="cupón..."></div><div class="ff" style="align-self:end"><button class="btn b2" onclick="addDiv()" style="width:100%">✓ Añadir</button></div></div></div><div id="dv-list"></div></div><div class="pg" id="pg-aq"><div class="fb"><h3>➕ Registrar adquisición o aportación</h3><div class="fg"><div class="ff"><label>Activo</label><select id="aq-a"><option value="fondos">🏦 Portfolio Fondos</option><option value="acciones">📈 Portfolio Acciones</option><option value="indexa">💼 Indexa Capital</option><option value="ibercaja">💼 Ibercaja Fondos</option><option value="eqqq">🇺🇸 EQQQ Nasdaq</option><option value="bitcoin">₿ Bitcoin</option><option value="solana">₿ Solana</option><option value="cln">📋 CLN SAN RKUNY</option><option value="phoenix">📋 Phoenix Ørsted</option></select></div><div class="ff"><label>Fecha</label><input type="date" id="aq-d"></div><div class="ff"><label>Nº Participaciones</label><input type="number" id="aq-u" step="0.000001" placeholder="Opcional"></div><div class="ff"><label>Precio/Ud. €</label><input type="number" id="aq-p" step="0.000001" placeholder="Opcional"></div><div class="ff"><label>Total € *</label><input type="number" id="aq-t" step="0.01" placeholder="Requerido"></div><div class="ff"><label>Notas</label><input type="text" id="aq-n"></div><div class="ff" style="align-self:end"><button class="btn b2" onclick="addAcq()" style="width:100%">✓ Añadir</button></div></div></div><div id="aq-list"></div></div><div class="pg" id="pg-hi"><div class="htabs"><button class="htb on" onclick="setHP('w',this)">Semanal</button><button class="htb" onclick="setHP('m',this)">Mensual</button><button class="htb" onclick="setHP('q',this)">Trimestral</button><button class="htb" onclick="setHP('a',this)">Anual</button></div><div class="sec"><div class="tw" id="hist"></div></div></div></div><div class="ov" id="m-exp"><div class="mb"><h3>⬇ Exportar</h3><p style="font-size:12px;color:#6b7280;margin-bottom:8px">Haz clic dentro, pulsa Ctrl+A y luego Ctrl+C.</p><textarea class="jb" id="exp-ta" readonly onclick="this.select()"></textarea><div class="row"><button class="btn b1" onclick="doCopy()" style="flex:1">📋 Copiar</button><button class="btn b3" onclick="closeM('m-exp')" style="flex:1">Cerrar</button></div></div></div><div class="ov" id="m-imp"><div class="mb"><h3>⬆ Importar</h3><textarea class="jb" id="imp-ta" placeholder="Pega aquí el JSON..."></textarea><div class="row"><button class="btn b2" onclick="doImp()" style="flex:1">✓ Importar</button><button class="btn b3" onclick="closeM('m-imp')" style="flex:1">Cancelar</button></div></div></div><div class="ov" id="m-per"><div class="mb"><h3 id="per-t"></h3><div id="per-b"></div><div class="row"><button class="btn b3" onclick="closeM('m-per')" style="width:100%">Cerrar</button></div></div></div><div class="toast" id="toast"></div><script>var A=[{id:"fondos",name:"Mi Portfolio de Fondos",icon:"🏦",acq:204112.98,type:"s"},{id:"acciones",name:"Mi Portfolio de Acciones",icon:"📈",acq:7410.61,type:"s",dv:true},{id:"otras",name:"Otras Carteras",icon:"💼",type:"g",ch:[{id:"indexa",name:"Indexa Capital",acq:33118.90},{id:"ibercaja",name:"Ibercaja Fondos",acq:37958.51}]},{id:"eqqq",name:"EQQQ Nasdaq",icon:"🇺🇸",acq:1807,type:"s"},{id:"cripto",name:"Criptomonedas",icon:"₿",type:"g",ch:[{id:"bitcoin",name:"Bitcoin",acq:26.82},{id:"solana",name:"Solana",acq:31.01}]},{id:"rfija",name:"Cartera de Renta Fija",icon:"📋",type:"g",ch:[{id:"cln",name:"CLN SAN RKUNY 090130",acq:80000,dv:true},{id:"phoenix",name:"Phoenix Ørsted 291027",acq:10000,dv:true}]}];var DV=["acciones","cln","phoenix"];var LEAF=[];for(var i=0;i<A.length;i++){if(A[i].type==="s")LEAF.push(A[i].id);else for(var j=0;j<A[i].ch.length;j++)LEAF.push(A[i].ch[j].id);}var TACQ=0;for(var i=0;i<A.length;i++){if(A[i].type==="s")TACQ+=A[i].acq;else for(var j=0;j<A[i].ch.length;j++)TACQ+=A[i].ch[j].acq;}var SK="inv2025";var D={weeks:[],acqs:[],divs:[]};var HP="w";function ga(id){for(var i=0;i<A.length;i++){if(A[i].type==="s"&&A[i].id===id)return A[i];if(A[i].type==="g")for(var j=0;j<A[i].ch.length;j++)if(A[i].ch[j].id===id)return A[i].ch[j];}return null;}function gs(id){for(var i=0;i<A.length;i++){if(A[i].type==="s"&&A[i].id===id)return A[i];if(A[i].type==="g")for(var j=0;j<A[i].ch.length;j++)if(A[i].ch[j].id===id)return A[i];}return null;}function fN(n,d){if(n===null||n===undefined||isNaN(n))return"—";return Number(n).toLocaleString("es-ES",{minimumFractionDigits:d||2,maximumFractionDigits:d||2});}function fE(n){return n===null||n===undefined||isNaN(n)?"—":fN(n)+" €";}function fP(n){return n===null||n===undefined||isNaN(n)?"—":(n>=0?"+":"")+fN(n)+"%";}function fD(n){return n===null||n===undefined||isNaN(n)?"—":(n>=0?"+":"")+fN(n)+" €";}function bc(n){return n===null||n===undefined||isNaN(n)?"bz":n>0?"bp":n<0?"bn":"bz";}function dES(s){if(!s)return"—";var p=s.split("-");return p[2]+"/"+p[1]+"/"+p[0];}function tod(){return new Date().toISOString().slice(0,10);}function setSt(m){document.getElementById("stbar").textContent=m;}function showT(msg,err){var t=document.getElementById("toast");t.textContent=msg;t.style.background=err?"#dc2626":"#16a34a";t.style.display="block";setTimeout(function(){t.style.display="none";},3000);}function loadD(){try{var r=localStorage.getItem(SK);if(r){var p=JSON.parse(r);if(p&&p.weeks){D=p;if(!D.acqs)D.acqs=[];if(!D.divs)D.divs=[];}}}catch(e){}if(!D.weeks)D.weeks=[];if(!D.acqs)D.acqs=[];if(!D.divs)D.divs=[];setSt(D.weeks.length>0?"✓ "+D.weeks.length+" semana(s) · "+D.acqs.length+" adq · "+D.divs.length+" divs":"Sin datos aún — introduce valores y pulsa Guardar semana");}function saveD(){try{localStorage.setItem(SK,JSON.stringify(D));setSt("✓ Guardado — "+D.weeks.length+" sem · "+D.acqs.length+" adq · "+D.divs.length+" divs");}catch(e){setSt("⚠ Error al guardar");}}function pWk(id){var s=D.weeks.slice().sort(function(a,b){return b.date.localeCompare(a.date);});if(!s.length)return null;var v=s[0].values&&s[0].values[id];return(v!=null&&!isNaN(v))?v:null;}function nWk(id,n){var s=D.weeks.slice().sort(function(a,b){return b.date.localeCompare(a.date);});if(s.length<n)return null;var v=s[n-1].values&&s[n-1].values[id];return(v!=null&&!isNaN(v))?v:null;}function dvA(id){var t=0;for(var i=0;i<D.divs.length;i++)if(D.divs[i].assetId===id)t+=D.divs[i].net||0;return t;}function dvS(sid){var sec=null;for(var i=0;i<A.length;i++)if(A[i].id===sid){sec=A[i];break;}if(!sec)return 0;var ids=sec.type==="s"?[sec.id]:sec.ch.map(function(c){return c.id;});var t=0;for(var i=0;i<ids.length;i++)t+=dvA(ids[i]);return t;}function dvAll(){var t=0;for(var i=0;i<D.divs.length;i++)t+=D.divs[i].net||0;return t;}function gv(id){var e=document.getElementById("m_"+id);return e?parseFloat(e.value):NaN;}function bdg(v,c){return'<span class="bg '+c+'">'+v+'</span>';}function render(){renderCards();renderSects();renderDivs();renderAcqs();renderHist();}function renderCards(){var tm=0;for(var i=0;i<LEAF.length;i++){var v=gv(LEAF[i]);if(!isNaN(v))tm+=v;}var pnl=tm>0?tm-TACQ:null,pnlP=pnl!==null?(pnl/TACQ)*100:null;var prev=0,hp=true;for(var i=0;i<LEAF.length;i++){var p=pWk(LEAF[i]);if(p===null){hp=false;break;}prev+=p;}var wkD=hp&&tm>0?tm-prev:null;var dvT=dvAll(),rt=pnl!==null?pnl+dvT:null;document.getElementById("cards").innerHTML='<div class="card"><div class="lb">Inversión total</div><div class="vl">'+fE(TACQ)+'</div><div class="sb">adquisición</div></div><div class="card"><div class="lb">Valor de mercado</div><div class="vl">'+(tm>0?fE(tm):"—")+'</div><div class="sb">actual</div></div><div class="card"><div class="lb">Ganancia/Pérdida</div><div class="vl '+(pnl!==null?(pnl>=0?"pos":"neg"):"")+'">'+(pnl!==null?fD(pnl):"—")+'</div><div class="sb">'+(pnlP!==null?fP(pnlP):"—")+'</div></div><div class="card"><div c
